<div class="container">
  <h2>Agendar Cita Médica</h2>
  
  <div class="form-group">
    <label>¿Cuál es el motivo de su consulta? (Describa sus síntomas)</label>
    <textarea [(ngModel)]="cita.motivo" placeholder="Ej: Dolor abdominal fuerte y fiebre..."></textarea>
  </div>

  <div class="form-group">
    <label>Seleccione un Médico:</label>
    <select [(ngModel)]="cita.id_medico">
      <option *ngFor="let m of medicos" [value]="m.id_medico">
        {{ m.nombre }} {{ m.apellidos }} - {{ m.especialidad }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label>Fecha y Hora:</label>
    <input type="datetime-local" [(ngModel)]="cita.fecha_hora">
  </div>

  <button (click)="agendarCita()" [disabled]="cargando">
    {{ cargando ? 'Procesando...' : 'Agendar Cita' }}
  </button>
</div>
